spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.routes[0].id=microsservico-autenticacao
spring.cloud.gateway.server.webflux.routes[0].uri=lb://microsservico-autenticacao
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=foresty-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://foresty-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/areas-florestais/**,/api/especies/**

spring.cloud.gateway.server.webflux.routes[2].id=operations-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://operations-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/colaboradores/**,/api/alocacoes/**,/api/ocorrencias/**

spring.cloud.gateway.server.webflux.routes[3].id=inventory-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://inventory-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/inventarios/**